# Prettier configuration for Home Assistant Custom Component Development
# Aligned with .editorconfig and .markdownlint.json

printWidth: 120
tabWidth: 2
useTabs: false
semi: true
singleQuote: false
quoteProps: "as-needed"
trailingComma: "es5"
bracketSpacing: true
arrowParens: "always"
proseWrap: "preserve"
endOfLine: "lf"

# File-specific overrides
overrides:
  # Markdown - preserve formatting, avoid conflicts with markdownlint
  - files: "*.md"
    options:
      proseWrap: "preserve"
      printWidth: 120
      trailingComma: "none"

  # JSON - Home Assistant manifest, translations
  - files: "*.json"
    options:
      tabWidth: 2
      trailingComma: "none"

  # JSONC - VS Code settings, devcontainer config
  - files: "*.jsonc"
    options:
      tabWidth: 2
      trailingComma: "none"

# No YAML override here: Prettier has no built-in YAML formatter and ignores *.yaml/*.yml
# by default. YAML style is enforced by yamllint (script/yaml-check) and formatted
# interactively by the redhat.vscode-yaml VS Code extension.
