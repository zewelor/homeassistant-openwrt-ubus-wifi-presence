name: HA Version Sync Check

on:
  pull_request:
    paths:
      - hacs.json
      - requirements_test.txt
      - .devcontainer/.env
      - .github/workflows/*.yml
      - script/ha-version-sync
      - script/setup/bootstrap
  push:
    branches:
      - main
    paths:
      - hacs.json
      - requirements_test.txt
      - .devcontainer/.env
      - .github/workflows/*.yml
      - script/ha-version-sync
      - script/setup/bootstrap

permissions: {}

jobs:
  check-ha-version-sync:
    name: Ensure HA version sources are in sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate HA version sync
        run: ./script/ha-version-sync
