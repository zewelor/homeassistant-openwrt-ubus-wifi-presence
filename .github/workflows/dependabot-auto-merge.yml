name: Dependabot Auto-merge

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge safe dependency updates after successful checks
        if: >
          (steps.metadata.outputs.package-ecosystem == 'github_actions' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor')) ||
          (steps.metadata.outputs.package-ecosystem == 'pip' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          while true; do
            CHECKS_JSON="$(gh pr checks "$PR_URL" --json name,bucket)"
            FAILED_COUNT="$(echo "$CHECKS_JSON" | jq '[.[] | select(.name != "enable-automerge" and .bucket == "fail")] | length')"
            PENDING_COUNT="$(echo "$CHECKS_JSON" | jq '[.[] | select(.name != "enable-automerge" and .bucket == "pending")] | length')"

            if [[ "$FAILED_COUNT" -gt 0 ]]; then
              echo "Required checks failed"
              echo "$CHECKS_JSON"
              exit 1
            fi

            if [[ "$PENDING_COUNT" -eq 0 ]]; then
              break
            fi

            sleep 10
          done

          gh pr merge --merge "$PR_URL"
